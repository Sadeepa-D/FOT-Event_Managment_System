<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${eventForm.id != null ? 'Edit Event' : 'Register Event'}">Event Form</title>
    <style>
        /* Header Styling */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem;
            text-align: center;
            margin-bottom: 20px;
            font-family: Arial, sans-serif;
        }

        /* Form Container */
        .form-container {
            max-width: 600px;
            margin: auto;
            padding: 30px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h2 { color: #2c3e50; margin-top: 0; }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
        }

        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }

        /* Button Styling */
        .btn-submit {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            border-radius: 4px;
            margin-top: 10px;
        }

        .btn-submit:hover { background-color: #219150; }

        .btn-back {
            display: inline-block;
            margin-top: 15px;
            color: #3498db;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <h1>FOT Event Management System</h1>
</header>

<div class="form-container">
    <h2 th:text="${eventForm.id != null ? 'Edit Existing Event' : 'Register New Event'}">Form Title</h2>

    <form th:action="@{/event/save}" th:object="${eventForm}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label>Event Name</label>
            <input type="text" th:field="*{eventName}" placeholder="e.g. Tech Symposium 2026" required/>
        </div>

        <div class="form-group">
            <label>Organizer Name</label>
            <input type="text" th:field="*{organizerName}" required/>
        </div>

        <div class="form-group">
            <label>Venue</label>
            <input type="text" th:field="*{venue}" placeholder="e.g. Auditorium, Ruhuna FOT" required/>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Date</label>
                <input type="date" th:field="*{date}" required/>
            </div>
            <div class="form-group">
                <label>Time</label>
                <input type="time" th:field="*{time}" required/>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Ticket Price (Rs.)</label>
                <input type="number" step="0.01" th:field="*{ticketPrice}" required/>
            </div>
            <div class="form-group">
                <label>Available Slots</label>
                <input type="number" th:field="*{availableSlots}" required/>
            </div>
        </div>

        <div class="form-group">
            <label>Little Description</label>
            <textarea th:field="*{description}" rows="4" placeholder="Briefly describe the event..."></textarea>
        </div>

        <button type="submit" class="btn-submit"
                th:text="${eventForm.id != null ? 'Update Event Details' : 'Save Event'}">
            Submit
        </button>

        <a th:href="@{/events}" class="btn-back">← Back to Events List</a>
    </form>
</div>

</body>
</html>
