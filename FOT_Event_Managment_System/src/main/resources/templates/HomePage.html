<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Event Management System</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 28px;
            color: #222;
        }

        .buttons {
            display: flex;
            gap: 16px;
        }

        button {
            width: 140px;
            height: 48px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: #3a7bd5;
            color: white;
        }

        button:hover {
            background: #2f63b0;
        }
    </style>
</head>
<body>

<h1>Event Management System</h1>

<div class="buttons">
    <button>Login</button>
    <button>Register</button>
    <button>Show Events</button>
</div>

</body>
</html>
