<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Users List</title>
</head>
<body>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Role</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${UserList}">
        <td th:text="${user.u_id}">1</td>
        <td th:text="${user.u_name}">JohnDoe</td>
        <td th:text="${user.role}">Admin</td>
        <td>
            <a th:href="@{/users/edit/{id}(id=${user.u_id})}">Edit</a>
            <a th:href="@{/users/delete/{id}(id=${user.u_id})}">Delete</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
