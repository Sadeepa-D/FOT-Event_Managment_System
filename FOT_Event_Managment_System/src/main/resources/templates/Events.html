<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Event List</title>
    <style>
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem;
            text-align: center;
            margin-bottom: 20px;
        }
        .container {
            max-width: 90%;
            margin: auto;
            font-family: Arial, sans-serif;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #f4f4f4;
            color: #333;
        }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .btn-add {
            background-color: #27ae60;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 10px;
        }
        .btn-delete {
            background-color: #e74c3c;
            color: white;
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-delete:hover { background-color: #c0392b; }
    </style>
</head>
<body>

<header>
    <h1>Events</h1>
</header>

<div class="container">
    <a th:href="@{/event/add}" class="btn-add">+ Register New Event</a>

    <table>
        <thead>
        <tr>
            <th>Event Name</th>
            <th>Organizer</th>
            <th>Venue</th>
            <th>Date & Time</th>
            <th>Price (Rs)</th>
            <th>Slots</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="event : ${events}">
            <td th:text="${event.eventName}">Name</td>
            <td th:text="${event.organizerName}">Organizer</td>
            <td th:text="${event.venue}">Venue</td>
            <td>
                <span th:text="${event.date}">Date</span> |
                <span th:text="${event.time}">Time</span>
            </td>
            <td th:text="${event.ticketPrice}">0.00</td>
            <td th:text="${event.availableSlots}">0</td>
            <td>
                <a th:href="@{/events/delete/{id}(id=${event.id})}"
                   class="btn-delete"
                   onclick="return confirm('Are you sure you want to delete this event?')">Delete</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(events)}">
            <td colspan="7" style="text-align: center;">No events registered yet.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
