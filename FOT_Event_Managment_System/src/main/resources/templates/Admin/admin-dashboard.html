<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - FOT</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Arial, sans-serif; }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { font-size: 1.5rem; }

        .logout {
            background-color: #e74c3c;
            padding: 8px 14px;
            border-radius: 5px;
            color: white;
            text-decoration: none;
        }

        .container {
            max-width: 90%;
            margin: 30px auto;
        }

        .info-bar {
            background: white;
            padding: 15px 20px;
            border-left: 5px solid #27ae60;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            table-layout: fixed;
        }

        th {
            background-color: #ecf0f1;
            padding: 16px;
            text-align: left;
            border-bottom: 3px solid #27ae60;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #eee;
            word-wrap: break-word;
            vertical-align: top;
        }

        /* Column widths */
        th:nth-child(1), td:nth-child(1) { width: 30%; }
        th:nth-child(2), td:nth-child(2) { width: 12%; }
        th:nth-child(3), td:nth-child(3) { width: 12%; }
        th:nth-child(4), td:nth-child(4) { width: 15%; }
        th:nth-child(5), td:nth-child(5) { width: 8%; }
        th:nth-child(6), td:nth-child(6) { width: 8%; }
        th:nth-child(7), td:nth-child(7) { width: 10%; }
        th:nth-child(8), td:nth-child(8) { width: 20%; }

        .event-name { font-weight: bold; }
        .date-text { color: #27ae60; font-weight: bold; }

        .btn {
            padding: 6px 10px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
            font-size: 0.85rem;
            display: inline-block;
            white-space: nowrap;
        }

        .approve { background-color: #27ae60; }
        .reject { background-color: #f39c12; }
        .delete { background-color: #e74c3c; }
        .view { background-color: #3498db; }

        .status { font-weight: bold; }
        .approved { color: #27ae60; }
        .rejected { color: #e74c3c; }
        .pending { color: #f39c12; }

        /* Action column button layout */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .action-buttons .top-buttons,
        .action-buttons .bottom-buttons {
            display: flex;
            gap: 5px;
            width: 100%;
            justify-content: flex-start;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<header>
    <h1>FOT Event Management System - Admin</h1>
    <a th:href="@{/login}" class="logout">Logout</a>
</header>

<div class="container">

    <div class="info-bar">
        <h3 th:text="'Take control: manage events, approvals, and participants'" style="text-align: center;"></h3>
    </div>
    <br><br>

    <table>
        <thead>
        <tr>
            <th>Event</th>
            <th>Organizer</th>
            <th>Venue</th>
            <th>Date & Time</th>
            <th>Price</th>
            <th>Slots</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="event : ${events}">
            <td>
                <div class="event-name" th:text="${event.eventName}">Event</div>
                <small th:text="${event.description}">desc</small>
            </td>
            <td th:text="${event.organizerName}"></td>
            <td th:text="${event.venue}"></td>
            <td>
                <span class="date-text" th:text="${event.date}"></span><br>
                <small th:text="${event.time}"></small>
            </td>
            <td th:text="${'Rs. ' + event.ticketPrice}"></td>
            <td th:text="${event.availableSlots}"></td>
            <td>
                <span class="status"
                      th:text="${event.eventstatus}"
                      th:classappend="
                        ${event.eventstatus == 'APPROVED'} ? ' approved' :
                        (${event.eventstatus == 'REJECTED'} ? ' rejected' : ' pending')">
                </span>
            </td>
            <td>
                <div class="action-buttons">
                    <div class="top-buttons">
                        <a th:href="@{'/admin/approve/' + ${event.id}}" class="btn approve">Approve</a>
                        <a th:href="@{'/admin/reject/' + ${event.id}}" class="btn reject">Reject</a>
                    </div>
                    <div class="bottom-buttons">
                        <a th:href="@{'/admin/delete/' + ${event.id}}" class="btn delete">Delete</a>
                        <a th:href="@{'/admin/participants/' + ${event.id}}" class="btn view">View Users</a>
                    </div>
                </div>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(events)}">
            <td colspan="8" style="text-align:center; padding:30px; color:#95a5a6;">
                No events available
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
