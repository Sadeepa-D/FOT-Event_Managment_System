<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Management | FOT Event Management System</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for modern, clean icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --navy: #1e2d3d;
            --navy-hover: #2a3f54;
            --teal: #17b89e;
            --teal-light: rgba(23, 184, 158, 0.1);
            --red: #e24b4a;
            --red-light: rgba(226, 75, 74, 0.1);
            --amber: #ef9f27;
            --purple: #7f77dd;
            --purple-light: rgba(127, 119, 221, 0.1);
            --light-gray: #f4f6f9;
            --gray: #8c98a4;
            --white: #ffffff;
            --text-main: #333333;
            --border-color: #e1e5eb;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--light-gray);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar Styles --- */
        .sidebar {
            width: 210px;
            background-color: var(--navy);
            color: var(--white);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px 0;
            list-style: none;
        }

        .nav-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            font-weight: 500;
            border-left: 4px solid transparent;
            cursor: pointer;
        }

        .nav-item:hover {
            background-color: var(--navy-hover);
            color: var(--white);
        }

        .nav-item.active {
            background-color: rgba(23, 184, 158, 0.1);
            color: var(--teal);
            border-left: 4px solid var(--teal);
        }

        .nav-item i {
            font-size: 1.2rem;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--teal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--white);
        }

        .admin-info {
            flex: 1;
        }

        .admin-name {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .logout-btn {
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: color 0.3s;
        }

        .logout-btn:hover {
            color: var(--red);
        }

        /* --- Main Content Area --- */
        .main-content {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--navy);
        }

        .live-date {
            font-size: 0.95rem;
            color: var(--gray);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--white);
            padding: 8px 16px;
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
        }

        /* --- Summary Stats --- */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background-color: var(--white);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .stat-icon.total {
            background-color: var(--purple-light);
            color: var(--purple);
        }

        .stat-icon.available {
            background-color: var(--teal-light);
            color: var(--teal);
        }

        .stat-icon.unavailable {
            background-color: var(--red-light);
            color: var(--red);
        }

        .stat-details h3 {
            font-size: 0.9rem;
            color: var(--gray);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .stat-details .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--navy);
        }

        .stat-details .stat-value.available { color: var(--teal); }
        .stat-details .stat-value.unavailable { color: var(--red); }

        /* --- Section Header --- */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .section-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--navy);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--teal);
            color: var(--white);
            box-shadow: 0 4px 10px rgba(23, 184, 158, 0.3);
        }

        .btn-primary:hover {
            background-color: #14a089;
            transform: translateY(-1px);
        }

        /* --- Venues Grid --- */
        .venues-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .venue-card {
            background-color: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .venue-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
        }

        .venue-card.status-available {
            border-left: 4px solid var(--teal);
        }

        .venue-card.status-unavailable {
            border-left: 4px solid var(--red);
        }

        .card-header {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .venue-card.status-available .card-header {
            background: linear-gradient(135deg, rgba(23,184,158,0.05) 0%, rgba(23,184,158,0.15) 100%);
        }

        .venue-card.status-unavailable .card-header {
            background: linear-gradient(135deg, rgba(226,75,74,0.05) 0%, rgba(226,75,74,0.15) 100%);
        }

        .card-header .emoji {
            font-size: 3rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .card-body {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .venue-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 4px;
        }

        /* Status Pill */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            width: max-content;
        }

        .status-pill .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-available .status-pill {
            background-color: var(--teal-light);
            color: var(--teal);
        }

        .status-available .status-pill .dot {
            background-color: var(--teal);
            box-shadow: 0 0 0 0 rgba(23, 184, 158, 0.7);
            animation: pulse-green 2s infinite;
        }

        .status-unavailable .status-pill {
            background-color: var(--red-light);
            color: var(--red);
        }

        .status-unavailable .status-pill .dot {
            background-color: var(--red);
            box-shadow: 0 0 0 0 rgba(226, 75, 74, 0.7);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(23, 184, 158, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(23, 184, 158, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(23, 184, 158, 0); }
        }

        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(226, 75, 74, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(226, 75, 74, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(226, 75, 74, 0); }
        }

        /* Capacity */
        .capacity-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .capacity-text {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-main);
            font-weight: 500;
        }

        .capacity-bar-bg {
            height: 6px;
            background-color: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            width: 100%;
        }

        .capacity-bar-fill {
            height: 100%;
            background-color: var(--amber);
            border-radius: 4px;
        }

        /* Events */
        .upcoming-events {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--gray);
            margin-top: auto;
        }

        /* Action Buttons */
        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--light-gray);
        }

        .btn-outline {
            flex: 1;
            padding: 8px 0;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .btn-outline.edit {
            border: 1px solid var(--navy);
            color: var(--navy);
        }
        .btn-outline.edit:hover { background: var(--navy); color: white; }

        .btn-outline.mark-avail {
            border: 1px solid var(--teal);
            color: var(--teal);
        }
        .btn-outline.mark-avail:hover:not(:disabled) { background: var(--teal); color: white; }

        .btn-outline.mark-unavail {
            border: 1px solid var(--red);
            color: var(--red);
        }
        .btn-outline.mark-unavail:hover:not(:disabled) { background: var(--red); color: white; }

        .btn-outline:disabled {
            border-color: #d1d5db;
            color: #9ca3af;
            cursor: not-allowed;
            background: #f3f4f6;
        }

        /* --- Empty State --- */
        .empty-state {
            display: none;
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            background-color: var(--white);
            border-radius: 12px;
            border: 2px dashed var(--border-color);
        }
        
        .empty-state.active {
            display: block;
        }

        .empty-icon {
            font-size: 4rem;
            color: #cbd5e1;
            margin-bottom: 16px;
        }

        .empty-text {
            font-size: 1.1rem;
            color: var(--gray);
            margin-bottom: 20px;
        }

        /* --- Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(30, 45, 61, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--white);
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--shadow-lg);
            transform: scale(0.95) translateY(20px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--navy);
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--gray);
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-modal:hover { color: var(--red); }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--navy);
        }

        .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            font-family: 'Poppins', sans-serif;
        }

        .form-control:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(23, 184, 158, 0.1);
        }
        
        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .toggle-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Custom Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--red);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--teal);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .toggle-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--red);
            transition: color 0.3s;
        }
        
        input:checked ~ .toggle-label {
            color: var(--teal);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 30px;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .btn-cancel:hover {
            background-color: var(--light-gray);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .venues-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 900px) {
            .stats-row { grid-template-columns: 1fr; gap: 12px; }
            .venues-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
            <h1 class="page-title">Location Management</h1>
            <div class="live-date">
                <i class="ph ph-clock"></i>
                <span id="currentDate">Loading date...</span>
            </div>
        </div>

        <!-- Summary Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon total">
                    <i class="ph ph-buildings"></i>
                </div>
                <div class="stat-details">
                    <h3>Total Venues</h3>
                    <div class="stat-value" id="statTotal" th:text="${#lists.size(locations)}">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon available">
                    <i class="ph ph-check-circle"></i>
                </div>
                <div class="stat-details">
                    <h3>Available Now</h3>
                    <div class="stat-value available" id="statAvailable" th:text="${#lists.size(locations.?[availability == 'available'])}">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon unavailable">
                    <i class="ph ph-prohibit"></i>
                </div>
                <div class="stat-details">
                    <h3>Unavailable</h3>
                    <div class="stat-value unavailable" id="statUnavailable" th:text="${#lists.size(locations.?[availability != 'available'])}">0</div>
                </div>
            </div>
        </div>

        <!-- Venues Section -->
        <div class="section-header">
            <h2>Faculty Venues</h2>
            <button class="btn btn-primary" id="openModalBtn">
                <i class="ph ph-plus-circle" style="font-size: 1.2rem;"></i> Add New Location
            </button>
        </div>

        <div class="venues-grid" id="venuesContainer" th:if="${not #lists.isEmpty(locations)}">
            <div th:each="venue : ${locations}" 
                 th:class="'venue-card ' + (${venue.availability == 'available'} ? 'status-available' : 'status-unavailable')">
                <div class="card-header">
                    <div class="emoji">📍</div>
                </div>
                <div class="card-body">
                    <h3 class="venue-name" th:text="${venue.locationName}">Venue Name</h3>
                    
                    <div class="status-pill">
                        <span class="dot"></span> <span th:text="${venue.availability == 'available' ? 'Available' : 'Unavailable'}">Status</span>
                    </div>
                    
                    <div class="capacity-info">
                        <div class="capacity-text">
                            <i class="ph ph-users"></i> <span th:text="${venue.capacity}">0</span> Persons
                        </div>
                        <div class="capacity-bar-bg">
                            <!-- Visual relative max assumed 3000 -->
                            <div class="capacity-bar-fill" th:style="'width: ' + (${venue.capacity} * 100 / 3000) + '%'"></div>
                        </div>
                    </div>
                    
                    <div class="card-actions">
                        <a th:href="@{'/admin/locations/edit/' + ${venue.id}}" class="btn-outline edit" style="text-decoration:none;">
                            <i class="ph ph-pencil-simple"></i> Edit
                        </a>
                        <a th:href="@{'/admin/locations/toggle/' + ${venue.id}}" 
                           class="btn-outline mark-avail" 
                           th:style="${venue.availability == 'available' ? 'pointer-events: none; opacity: 0.5;' : ''}" style="text-decoration:none;">
                            <i class="ph ph-check"></i> Available
                        </a>
                        <a th:href="@{'/admin/locations/toggle/' + ${venue.id}}" 
                           class="btn-outline mark-unavail" 
                           th:style="${venue.availability == 'unavailable' ? 'pointer-events: none; opacity: 0.5;' : ''}" style="text-decoration:none;">
                            <i class="ph ph-prohibit"></i> Unavailable
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="empty-state" id="emptyState" th:if="${#lists.isEmpty(locations)}" style="display: block;">
            <i class="ph ph-map-pin-line empty-icon"></i>
            <div class="empty-text">No venues added yet. Add your first venue.</div>
            <button class="btn btn-primary" onclick="document.getElementById('openModalBtn').click()">
                Add Location
            </button>
        </div>
    </main>

    <!-- Add Location Modal -->
    <div class="modal-overlay" id="addLocationModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Location</h2>
                <button class="close-modal" id="closeModalBtn"><i class="ph ph-x"></i></button>
            </div>
            
            <form id="addLocationForm" th:action="@{/admin/locations/save}" th:object="${location}" method="post">
                <div class="form-group">
                    <label for="locName">Location Name</label>
                    <input type="text" id="locName" th:field="*{locationName}" class="form-control" placeholder="e.g. Auditorium" required>
                </div>
                
                <div class="form-group">
                    <label for="locCapacity">Capacity (Persons)</label>
                    <input type="number" id="locCapacity" th:field="*{capacity}" class="form-control" placeholder="e.g. 3000" min="1" required>
                </div>

                <div class="form-group">
                    <label>Current Status</label>
                    <div class="toggle-group">
                        <label class="switch">
                            <input type="checkbox" id="locStatus" onchange="document.getElementById('hiddenAvailability').value = this.checked ? 'available' : 'unavailable'" checked>
                            <span class="slider"></span>
                        </label>
                        <span class="toggle-label" id="statusLabelText">Available</span>
                    </div>
                    <input type="hidden" id="hiddenAvailability" th:field="*{availability}" value="available" />
                </div>

                <div class="form-group">
                    <label for="locDesc">Description (Optional)</label>
                    <textarea id="locDesc" class="form-control" placeholder="Brief details about the venue..."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-cancel" id="cancelModalBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Location</button>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript logic -->
    <script>
        // Modal Elements
        const modal = document.getElementById('addLocationModal');
        const openModalBtn = document.getElementById('openModalBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelModalBtn = document.getElementById('cancelModalBtn');
        const addLocationForm = document.getElementById('addLocationForm');
        const locStatusToggle = document.getElementById('locStatus');
        const statusLabelText = document.getElementById('statusLabelText');

        // Update Live Date
        function updateDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', options);
        }
        setInterval(updateDate, 1000);
        updateDate();

        // Modal Logic
        function openModal() {
            modal.classList.add('active');
            // reset form
            addLocationForm.reset();
            locStatusToggle.checked = true;
            updateToggleLabel();
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        openModalBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        cancelModalBtn.addEventListener('click', closeModal);

        // Close modal on outside click
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        // Toggle Label Update
        function updateToggleLabel() {
            if (locStatusToggle.checked) {
                statusLabelText.textContent = "Available";
                statusLabelText.style.color = "var(--teal)";
            } else {
                statusLabelText.textContent = "Unavailable";
                statusLabelText.style.color = "var(--red)";
            }
        }
        locStatusToggle.addEventListener('change', updateToggleLabel);
    </script>
</body>
</html>
