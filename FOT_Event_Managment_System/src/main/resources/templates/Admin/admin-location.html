<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Location Management</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 95%;
            margin: 30px auto;
        }

        .btn-available {
            background: #3498db;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            text-decoration: none;
            margin-left: 5px;
        }

        .info-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            border-left: 6px solid #27ae60;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-add {
            background-color: #27ae60;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }

        .table-wrapper {
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #f8f9fa;
            padding: 15px;
            text-align: left;
            border-bottom: 3px solid #27ae60;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #eee;
        }

        .btn-edit {
            background: #f39c12;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            text-decoration: none;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<header>
    <h1>FOT EVENTS | Locations</h1>
    <a th:href="@{/admin/dashboard}" style="color:white;">Back</a>
</header>

<div class="container">

    <!-- Top Section -->
    <div class="info-card">
        <h2>Location Management</h2>
        <a th:href="@{/admin/locations/add}" class="btn-add">+ Add Location</a>
    </div>

    <!-- Table -->
    <div class="table-wrapper">

        <table>
            <thead>
            <tr>
                <th>Location ID</th>
                <th>Location Name</th>
                <th>Capacity</th>
                <th>Availability</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="loc : ${locations}">
                <td th:text="${loc.id}"></td>
                <td th:text="${loc.locationName}"></td>
                <td th:text="${loc.capacity}"></td>
                <td th:text="${loc.availability}"></td>
                <td>
                    <a th:href="@{'/admin/locations/edit/' + ${loc.id}}" class="btn-edit">Edit</a>
                    <a th:href="@{'/admin/locations/delete/' + ${loc.id}}"
                       class="btn-delete"
                       onclick="return confirm('Delete this location?')">Delete</a>
                    <a th:href="@{'/admin/locations/toggle/' + ${loc.id}}"
                       class="btn-available"
                       th:text="${loc.availability == 'available' ? 'Set Unavailable' : 'Set Available'}">
                    </a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(locations)}">
                <td colspan="5">No locations available</td>
            </tr>
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
