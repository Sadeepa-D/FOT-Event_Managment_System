<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${location.id != null ? 'Edit Location | FOT Management' : 'Add Location | FOT Management'}">Add Location</title>
  <!-- Google Fonts: Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
        --navy: #1e2d3d;
        --teal: #17b89e;
        --teal-light: rgba(23, 184, 158, 0.15);
        --gray-bg: #f4f6f9;
        --white: #ffffff;
        --gray-text: #6b7280;
        --gray-dark: #374151;
        --border-color: #e5e7eb;
        --shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
        --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
    body { background-color: var(--gray-bg); color: var(--gray-dark); min-height: 100vh; display: flex; flex-direction: column; }

    header {
        background-color: var(--navy);
        color: var(--white);
        padding: 1.5rem 5%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: var(--shadow-sm);
        margin-bottom: 40px;
    }
    header h1 { font-size: 1.4rem; font-weight: 600; }

    .form-container {
        max-width: 550px;
        margin: 0 auto 50px auto;
        background: var(--white);
        padding: 40px;
        border-radius: 12px;
        box-shadow: var(--shadow-md);
        border-top: 5px solid var(--teal);
    }

    h2 { color: var(--navy); margin-bottom: 25px; text-align: center; font-size: 1.6rem; font-weight: 700; }
    
    .form-group { margin-bottom: 24px; }
    
    label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--gray-dark); font-size: 0.9rem; }

    input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s;
        color: var(--gray-dark);
    }
    input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-light); outline: none; }

    .btn-submit {
        background-color: var(--teal);
        color: var(--white);
        border: none;
        padding: 14px;
        width: 100%;
        font-weight: 600;
        font-size: 1.05rem;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }
    .btn-submit:hover { background-color: #14a089; transform: translateY(-1px); }

    .btn-back {
        display: block;
        text-align: center;
        margin-top: 25px;
        color: var(--teal);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        transition: color 0.2s;
    }
    .btn-back:hover { color: var(--navy); text-decoration: underline; }
    ::placeholder { color: #bdc3c7; }
  </style>
</head>

<body>

<header>
  <h1>FOT EVENTS | Faculty Venues</h1>
</header>

<div class="form-container">
  <h2 th:text="${location.id != null ? 'Update Location Details' : 'Add New Location'}">Add New Location</h2>

  <form th:action="@{/admin/locations/save}" th:object="${location}" method="post">
    <input type="hidden" th:field="*{id}" />

    <div class="form-group">
      <label for="locationName">Location Name</label>
      <input type="text" id="locationName" th:field="*{locationName}"
             placeholder="e.g. Auditorium 01, Faculty of Technology" required>
    </div>

    <div class="form-group">
      <label for="capacity">Seating Capacity</label>
      <input type="number" id="capacity" th:field="*{capacity}"
             placeholder="e.g. 250" min="1" required>
    </div>

    <button type="submit" class="btn-submit"
            th:text="${location.id != null ? 'Update Venue' : 'Register Location'}">
      Save Location
    </button>

    <a th:href="@{/admin/locations}" class="btn-back">← Back to Location List</a>
  </form>
</div>

</body>
</html>
