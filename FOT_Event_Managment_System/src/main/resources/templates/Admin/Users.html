<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Users | FOT Event Management System</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --navy: #1e2d3d;
            --teal: #17b89e;
            --teal-light: rgba(23, 184, 158, 0.15);
            --red: #e24b4a;
            --red-light: rgba(226, 75, 74, 0.15);
            --amber: #ef9f27;
            --amber-light: rgba(239, 159, 39, 0.15);
            --blue: #3b82f6;
            --blue-light: rgba(59, 130, 246, 0.15);
            --purple: #7f77dd;
            --purple-light: rgba(127, 119, 221, 0.15);
            --gray-bg: #f4f6f9;
            --white: #ffffff;
            --gray-text: #6b7280;
            --gray-dark: #374151;
            --border-color: #e5e7eb;
            --gray-hover: #f9fafb;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--gray-bg);
            color: var(--gray-dark);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Main Content Area --- */
        .main-content {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
        }

        /* --- Top Bar --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--navy);
        }

        .live-date {
            font-size: 0.95rem;
            color: var(--gray-text);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--white);
            padding: 8px 16px;
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
        }

        /* --- Summary Stats --- */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background-color: var(--white);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .stat-icon.total { background-color: var(--blue-light); color: var(--blue); }
        .stat-icon.organizers { background-color: var(--purple-light); color: var(--purple); }
        .stat-icon.participants { background-color: var(--teal-light); color: var(--teal); }
        .stat-icon.suspended { background-color: var(--red-light); color: var(--red); }

        .stat-details h3 {
            font-size: 0.9rem;
            color: var(--gray-text);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .stat-details .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--navy);
        }

        /* --- Section Header & Search --- */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--navy);
        }

        .controls-wrapper {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 10px 16px 10px 40px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            width: 300px;
            font-size: 0.9rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .search-box input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px var(--teal-light);
        }

        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            color: var(--gray-text);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--teal);
            color: var(--white);
            box-shadow: 0 4px 10px rgba(23, 184, 158, 0.3);
        }

        .btn-primary:hover {
            background-color: #14a089;
            transform: translateY(-1px);
        }

        /* --- Table Section --- */
        .table-card {
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #fafafa;
            padding: 16px 24px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--gray-text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 16px 24px;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
            color: var(--gray-dark);
        }

        tr:hover td {
            background-color: var(--gray-hover);
        }

        .user-main {
            font-weight: 600;
            color: var(--navy);
            display: block;
        }

        .sub-text {
            font-size: 0.8rem;
            color: var(--gray-text);
            margin-top: 2px;
        }

        .reg-no-text {
            font-family: monospace;
            font-weight: 600;
            color: var(--navy);
            background: var(--gray-bg);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .empty-reg {
            color: #bdc3c7;
        }

        /* --- Pills & Badges --- */
        .pill {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 90px;
        }

        /* Roles */
        .pill-organizer { background: var(--purple-light); color: var(--purple); }
        .pill-participant { background: var(--blue-light); color: var(--blue); }

        /* Statuses */
        .status-active { background: var(--teal-light); color: var(--teal); }
        .status-suspended { background: var(--red-light); color: var(--red); }

        /* --- Action Buttons --- */
        .actions-cell {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-action {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
            position: relative;
            font-size: 1.1rem;
        }

        .btn-action[title]:hover::after {
            content: attr(title);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-5px);
            background: var(--navy);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            white-space: nowrap;
            pointer-events: none;
            z-index: 10;
        }

        .action-edit { background: var(--amber-light); color: var(--amber); }
        .action-edit:hover { background: var(--amber); color: white; }

        .action-delete { background: var(--red-light); color: var(--red); }
        .action-delete:hover { background: var(--red); color: white; }

        .action-suspend { background: #f3f4f6; color: #6b7280; }
        .action-suspend:hover { background: #4b5563; color: white; }

        .action-activate { background: var(--teal-light); color: var(--teal); }
        .action-activate:hover { background: var(--teal); color: white; }

        .empty-row td {
            text-align: center;
            padding: 40px;
            color: var(--gray-text);
            font-style: italic;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .search-box input { width: 220px; }
        }

        @media (max-width: 900px) {
            .stats-row { grid-template-columns: 1fr; }
            .section-header { flex-direction: column; align-items: flex-start; gap: 16px; }
            .controls-wrapper { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
            <h1 class="page-title">System Users</h1>
            <div class="live-date">
                <i class="ph ph-clock"></i>
                <span id="currentDate">Loading date...</span>
            </div>
        </div>

        <!-- Summary Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon total">
                    <i class="ph ph-users-three"></i>
                </div>
                <div class="stat-details">
                    <h3>Total Users</h3>
                    <div class="stat-value" th:text="${#lists.size(UserList)}">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon organizers">
                    <i class="ph ph-briefcase"></i>
                </div>
                <div class="stat-details">
                    <h3>Organizers</h3>
                    <div class="stat-value" th:text="${#lists.size(UserList.?[userrole == 'ORGANIZER'])}">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon participants">
                    <i class="ph ph-student"></i>
                </div>
                <div class="stat-details">
                    <h3>Participants</h3>
                    <div class="stat-value" th:text="${#lists.size(UserList.?[userrole == 'PARTICIPANT'])}">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon suspended">
                    <i class="ph ph-user-minus"></i>
                </div>
                <div class="stat-details">
                    <h3>Suspended</h3>
                    <div class="stat-value" th:text="${#lists.size(UserList.?[userstatus != 'Active'])}">0</div>
                </div>
            </div>
        </div>

        <!-- Section Header -->
        <div class="section-header">
            <h2>Registered Users</h2>
            <div class="controls-wrapper">
                <div class="search-box">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="userSearch" onkeyup="filterUserTable()" placeholder="Search name, email, or reg no...">
                </div>
                <a th:href="@{/users/add}" class="btn btn-primary">
                    <i class="ph ph-user-plus"></i> Add New User
                </a>
            </div>
        </div>

        <!-- Users Table -->
        <div class="table-card">
            <table id="userTable">
                <thead>
                    <tr>
                        <th>User Identity</th>
                        <th>Registration No</th>
                        <th>System Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${UserList}">
                        <td>
                            <span class="user-main" th:text="${user.username}">User Name</span>
                            <div class="sub-text" th:text="${user.useremail}">user@example.com</div>
                        </td>
                        <td>
                            <span th:if="${user.regno != null && !user.regno.isEmpty()}" class="reg-no-text" th:text="${user.regno}">REG/001</span>
                            <span th:unless="${user.regno != null && !user.regno.isEmpty()}" class="empty-reg">—</span>
                        </td>
                        <td>
                            <span th:text="${user.userrole}" th:class="'pill ' + (${user.userrole == 'ORGANIZER' ? 'pill-organizer' : 'pill-participant'})">
                                Role
                            </span>
                        </td>
                        <td>
                            <span th:text="${user.userstatus != null ? user.userstatus : 'Active'}" 
                                  th:class="'pill ' + (${user.userstatus != null && user.userstatus.equalsIgnoreCase('Active') ? 'status-active' : 'status-suspended'})">
                                Active
                            </span>
                        </td>
                        <td>
                            <div class="actions-cell">
                                <a th:href="@{/users/edit/{id}(id=${user.userid})}" class="btn-action action-edit" title="Edit User">
                                    <i class="ph ph-pencil-simple"></i>
                                </a>

                                <a th:if="${user.userstatus != null && user.userstatus.equalsIgnoreCase('Active')}" 
                                   th:href="@{/users/suspend/{id}(id=${user.userid})}" 
                                   class="btn-action action-suspend" title="Suspend User"
                                   onclick="return confirm('Suspend this user? They will not be able to login.')">
                                    <i class="ph ph-pause-circle"></i>
                                </a>

                                <a th:if="${user.userstatus == null || !user.userstatus.equalsIgnoreCase('Active')}" 
                                   th:href="@{/users/activate/{id}(id=${user.userid})}" 
                                   class="btn-action action-activate" title="Activate User"
                                   onclick="return confirm('Activate this account?')">
                                    <i class="ph ph-play-circle"></i>
                                </a>

                                <a th:href="@{/users/delete/{id}(id=${user.userid})}" 
                                   class="btn-action action-delete" title="Delete Permanently"
                                   onclick="return confirm('Permanently delete this user?')">
                                    <i class="ph ph-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(UserList)}" class="empty-row">
                        <td colspan="5">No registered users found in the system.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Scripts -->
    <script>
        // Update Live Date
        function updateDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', options);
        }
        setInterval(updateDate, 1000);
        updateDate();

        // Search Filter
        function filterUserTable() {
            const input = document.getElementById("userSearch");
            const filter = input.value.toUpperCase();
            const table = document.getElementById("userTable");
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                const tdIdentity = tr[i].getElementsByTagName("td")[0];
                const tdReg = tr[i].getElementsByTagName("td")[1];
                
                if (tdIdentity || tdReg) {
                    const txtIdentity = tdIdentity.textContent || tdIdentity.innerText;
                    const txtReg = tdReg.textContent || tdReg.innerText;

                    if (txtIdentity.toUpperCase().indexOf(filter) > -1 || txtReg.toUpperCase().indexOf(filter) > -1) {
                        tr[i].style.display = "";
                    } else {
                        tr[i].style.display = "none";
                    }
                }
            }
        }
    </script>
</body>
</html>
