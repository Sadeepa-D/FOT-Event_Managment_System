<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f2f5;
            font-family: Arial, sans-serif;
        }

        .card {
            background: #fff;
            padding: 40px 36px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 360px;
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 1.5rem;
            color: #222;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #444;
            margin-bottom: 6px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.95rem;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #4a90e2; }

        .forgot {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            color: #4a90e2;
            text-decoration: none;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 11px;
            background: #4a90e2;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #357abd; }

        .signup {
            text-align: center;
            margin-top: 18px;
            font-size: 0.85rem;
            color: #666;
        }

        .signup a { color: #4a90e2; text-decoration: none; }
    </style>

</head>


<body>

<div class="card">
    <h2>Login</h2>
    <form action="#" method="post">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required />
        <button type="submit">Login</button>
    </form>
    <p class="signup">Don't have an account? <a href="#">Sign up</a></p>
</div>




</body>
</html>
