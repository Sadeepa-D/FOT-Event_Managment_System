<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${UserForm.userid != null ? 'Edit User - FOT Management' : 'Register - FOT Management'}">Register</title>
  <!-- Google Fonts: Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
        --navy: #1e2d3d;
        --teal: #17b89e;
        --teal-light: rgba(23, 184, 158, 0.15);
        --amber: #ef9f27;
        --amber-light: rgba(239, 159, 39, 0.15);
        --gray-bg: #f4f6f9;
        --white: #ffffff;
        --gray-text: #6b7280;
        --gray-dark: #374151;
        --border-color: #e5e7eb;
        --shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
        --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
    
    body { 
        min-height: 100vh; 
        display: flex; 
        flex-direction: column; 
        background: var(--gray-bg); 
        color: var(--gray-dark);
    }
    
    header { 
        background-color: var(--navy); 
        color: var(--white); 
        padding: 1.5rem; 
        text-align: center; 
        box-shadow: var(--shadow-sm); 
    }
    header h1 { font-size: 1.5rem; font-weight: 600; }

    .reg-container { 
        flex: 1; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        padding: 30px 20px; 
    }
    
    .card { 
        background: var(--white); 
        padding: 40px; 
        border-radius: 12px; 
        box-shadow: var(--shadow-md); 
        width: 100%; 
        max-width: 500px; 
        border-top: 5px solid var(--teal); 
    }
    
    h2 { text-align: center; margin-bottom: 25px; font-size: 1.8rem; color: var(--navy); font-weight: 700; }
    
    .form-group { margin-bottom: 24px; }
    
    label { display: block; font-size: 0.9rem; font-weight: 600; color: var(--gray-dark); margin-bottom: 8px; }
    
    input, select { 
        width: 100%; 
        padding: 12px 15px; 
        border: 1px solid var(--border-color); 
        border-radius: 8px; 
        font-size: 1rem; 
        outline: none; 
        transition: all 0.3s; 
        background-color: var(--white); 
        color: var(--gray-dark);
    }
    
    input:focus, select:focus { 
        border-color: var(--teal); 
        box-shadow: 0 0 0 3px var(--teal-light); 
    }

    /* Dynamic Button Colors */
    .btn-register { 
        width: 100%; 
        padding: 14px; 
        background: var(--teal); 
        color: var(--white); 
        border: none; 
        border-radius: 8px; 
        font-size: 1.05rem; 
        font-weight: 600; 
        cursor: pointer; 
        transition: 0.3s; 
        margin-top: 10px; 
    }
    .btn-edit { background: var(--amber); }
    .btn-register:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); opacity: 0.95; }

    .login-link { text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--gray-text); }
    .login-link a { color: var(--teal); text-decoration: none; font-weight: 600; }
    .login-link a:hover { text-decoration: underline; }
    
    .footer-note { margin-top: 25px; font-size: 0.8rem; color: var(--gray-text); text-align: center; }
  </style>
</head>

<body>

<header>
  <h1>FOT Event Management System</h1>
</header>

<div class="reg-container">
  <div class="card">
    <h2 th:text="${UserForm.userid != null ? 'Update User Account' : 'Create Account'}">Create Account</h2>

    <form th:action="@{/users/save}" th:object="${UserForm}" method="post">

      <input type="hidden" th:field="*{userid}" />
      <input type="hidden" th:field="*{userstatus}" />

      <div class="form-group">
        <label for="username">Full Name</label>
        <input type="text" id="username" th:field="*{username}" placeholder="e.g. Sadeepa Dinakara" required/>
      </div>

      <div class="form-group">
        <label for="useremail">Email Address</label>
        <input type="email" id="useremail" th:field="*{useremail}" placeholder="you@ruhuna.ac.lk" required/>
      </div>

      <div class="form-group">
        <label for="userpassword" th:text="${UserForm.userid != null ? 'New Password (Leave blank to keep current)' : 'Password'}">Password</label>
        <input type="password" id="userpassword" th:field="*{userpassword}" placeholder="••••••••"
               th:required="${UserForm.userid == null}"/>
      </div>

      <div class="form-group">
        <label for="userrole">Account Role</label>
        <select id="userrole" th:field="*{userrole}">
          <option value="ORGANIZER">Organizer (Can create events)</option>
          <option value="PARTICIPANT">Participant (Can join events)</option>
          <option value="ADMIN" th:if="${UserForm.userrole == 'ADMIN'}">Administrator</option>
        </select>
      </div>

      <button type="submit"
              th:class="'btn-register ' + (${UserForm.userid != null ? 'btn-edit' : ''})"
              th:text="${UserForm.userid != null ? 'Save Changes' : 'Register Now'}">
        Register Now
      </button>
    </form>

    <p class="login-link" th:if="${UserForm.userid == null}">
      Already have an account?
      <a th:href="@{/login}">Log in here</a>
    </p>

    <p class="login-link" th:if="${UserForm.userid != null}">
      <a th:href="@{/users}">← Back to User List</a>
    </p>

    <p class="footer-note">University of Ruhuna - Faculty of Technology</p>
  </div>
</div>

</body>
</html>
