<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - FOT Event Management</title>
    <style>
        /* General Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f4f7f6; /* Matching main page bg */
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* Header Styling - Matching Main/Add Page */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid #27ae60; /* Using the theme Green */
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8rem;
            color: #2c3e50; /* Theme Navy */
        }

        /* Error Message Styling */
        .error-msg {
            color: #e74c3c;
            background: #fdf2f2;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.85rem;
            border: 1px solid #facccc;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #34495e;
            margin-bottom: 8px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #27ae60;
            box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #2c3e50; /* Theme Navy */
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #1a252f;
        }

        .signup {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        .signup a {
            color: #27ae60;
            text-decoration: none;
            font-weight: bold;
        }

        .signup a:hover { text-decoration: underline; }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
        }

        .back-home a { color: #3498db; text-decoration: none; }
    </style>
</head>

<body>

<header>
    <h1>FOT Event Management System</h1>
</header>

<div class="login-container">
    <div class="card">
        <h2>Login</h2>

        <div th:if="${param.error}" class="error-msg">
            Invalid email or password. Please try again.
        </div>

        <form th:action="@{/login}" method="post">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="username" placeholder="you@example.com" required />

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required />

            <button type="submit">Access Dashboard</button>
        </form>

        <p class="signup">
            New organizer?
            <a th:href="@{/users/add}">Create an Account</a>
        </p>

        <div class="back-home">
            <a th:href="@{/}">← Back to Welcome Page</a>
        </div>
    </div>
</div>

</body>
</html>
