<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FOT Event Management</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1e2d3d;
            --teal: #17b89e;
            --teal-light: rgba(23, 184, 158, 0.15);
            --red: #e24b4a;
            --red-light: rgba(226, 75, 74, 0.15);
            --gray-bg: #f4f6f9;
            --white: #ffffff;
            --gray-text: #6b7280;
            --gray-dark: #374151;
            --border-color: #e5e7eb;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--gray-bg);
            color: var(--gray-dark);
        }

        /* Header Styling */
        header {
            background-color: var(--navy);
            color: var(--white);
            padding: 1.5rem;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        
        header h1 { font-size: 1.5rem; font-weight: 600; }

        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 420px;
            border-top: 5px solid var(--teal);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8rem;
            color: var(--navy);
            font-weight: 700;
        }

        /* Error Message Styling */
        .error-msg {
            color: var(--red);
            background: var(--red-light);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--gray-dark);
            margin-bottom: 8px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 24px;
            outline: none;
            transition: all 0.3s;
            color: var(--gray-dark);
        }

        input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px var(--teal-light);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--navy);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background: #14202b;
            transform: translateY(-1px);
        }

        .signup {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--gray-text);
        }

        .signup a {
            color: var(--teal);
            text-decoration: none;
            font-weight: 600;
        }

        .signup a:hover { text-decoration: underline; }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
        }

        .back-home a { 
            color: var(--gray-text); 
            text-decoration: none; 
            transition: color 0.2s;
        }
        
        .back-home a:hover {
            color: var(--navy);
        }
    </style>
</head>

<body>

<header>
    <h1>FOT Event Management System</h1>
</header>

<div class="login-container">
    <div class="card">
        <h2>Welcome Back</h2>

        <div th:if="${param.error}" class="error-msg">
            <span th:if="${session['SPRING_SECURITY_LAST_EXCEPTION'] != null}"
                  th:text="${session['SPRING_SECURITY_LAST_EXCEPTION'].message}">
                Error Message
            </span>
            <span th:unless="${session['SPRING_SECURITY_LAST_EXCEPTION'] != null}">
                Invalid email or password. Please try again.
            </span>
        </div>

        <form th:action="@{/login}" method="post">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="username" placeholder="you@example.com" required />

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required />

            <button type="submit">Access Dashboard</button>
        </form>

        <p class="signup">
            New organizer?
            <a th:href="@{/users/add}">Create an Account</a>
        </p>

        <div class="back-home">
            <a th:href="@{/}">← Back to Welcome Page</a>
        </div>
    </div>
</div>

</body>
</html>
