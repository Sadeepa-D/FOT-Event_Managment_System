<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome - FOT Event Management</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Styling (Matching Add Event) */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Hero Section */
        .hero-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        /* Image Styling */
        .hero-image {
            width: 220px;
            max-width: 80%;
            height: auto;
            transition: transform 0.3s ease;
        }

        h1 {
            color: #2c3e50;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h3 {
            color: #7f8c8d;
            font-weight: 400;
            margin-bottom: 40px;
        }

        /* Button Container */
        .button-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Button Styling */
        .btn {
            text-decoration: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
            min-width: 180px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Color Themes */
        .btn-login {
            background-color: #3498db; /* Professional Blue */
            color: white;
        }

        .btn-register {
            background-color: #27ae60; /* Same Green as Add Event */
            color: white;
        }

        .btn-events {
            background-color: #2c3e50; /* Same Navy as Header */
            color: white;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            color: #95a5a6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <h2>Faculty of Technology - University of Ruhuna</h2>
</header>

<div class="hero-container">
    <h1>Welcome to FOT Event Management System</h1>
    <img th:src="@{/images/uni.png}" alt="Logo" class="hero-image">
    <br>
    <h3>Your central hub for campus events and faculty activities</h3>

    <div class="button-group">
        <a th:href="@{/login}" class="btn btn-login">Login</a>

        <a th:href="@{/users/add}" class="btn btn-register">Register</a>

        <a th:href="@{/allevents}" class="btn btn-events">Show Events</a>
    </div>
</div>

<footer>
    <p>&copy; 2026 FOT Ruhuna. All Rights Reserved.</p>
</footer>

</body>
</html>
