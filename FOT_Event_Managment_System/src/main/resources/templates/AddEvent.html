<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Event</title>
    <style>
        /* Simple Header CSS */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem;
            text-align: center;
            margin-bottom: 20px;
        }
        .form-container {
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: Arial, sans-serif;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button {
            background-color: #27ae60; color: white; border: none;
            padding: 10px 20px; cursor: pointer; width: 100%; font-size: 16px;
        }
        button:hover { background-color: #219150; }
    </style>
</head>
<body>

<header>
    <h1>FOT Event Management System</h1>
</header>

<div class="form-container">
    <h2>Register New Event</h2>
    <form th:action="@{/event/save}" th:object="${eventForm}" method="post">

        <div class="form-group">
            <label>Event Name:</label>
            <input type="text" th:field="*{eventName}" required/>
        </div>

        <div class="form-group">
            <label>Organizer Name:</label>
            <input type="text" th:field="*{organizerName}" required/>
        </div>

        <div class="form-group">
            <label>Venue:</label>
            <input type="text" th:field="*{venue}" required/>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>Date:</label>
                <input type="date" th:field="*{date}" required/>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Time:</label>
                <input type="time" th:field="*{time}" required/>
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>Ticket Price (Rs):</label>
                <input type="number" step="0.01" th:field="*{ticketPrice}" required/>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Available Slots:</label>
                <input type="number" th:field="*{availableSlots}" required/>
            </div>
        </div>

        <div class="form-group">
            <label>Description:</label>
            <textarea th:field="*{description}" rows="3"></textarea>
        </div>

        <button type="submit">Save Event</button>
    </form>
</div>

</body>
</html>
