<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Join Event - FOT Management</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1e2d3d;
            --teal: #17b89e;
            --teal-light: rgba(23, 184, 158, 0.15);
            --red: #e24b4a;
            --gray-bg: #f4f6f9;
            --white: #ffffff;
            --gray-text: #6b7280;
            --gray-dark: #374151;
            --border-color: #e5e7eb;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--gray-bg); color: var(--gray-dark); min-height: 100vh; display: flex; flex-direction: column; }

        header {
            background-color: var(--navy);
            color: var(--white);
            padding: 1.5rem;
            text-align: center;
            box-shadow: var(--shadow-sm);
            margin-bottom: 30px;
        }
        header h1 { font-size: 1.5rem; font-weight: 600; }

        .form-container {
            max-width: 500px;
            margin: 0 auto 50px auto;
            background: var(--white);
            padding: 35px;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            border-top: 5px solid var(--teal);
        }

        h2 { color: var(--navy); margin-bottom: 10px; text-align: center; font-weight: 700; font-size: 1.6rem; }
        .event-sub { color: var(--gray-text); text-align: center; margin-bottom: 25px; font-size: 0.95rem; }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--gray-dark);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
            color: var(--gray-dark);
        }

        input:focus {
            border-color: var(--teal);
            outline: none;
            box-shadow: 0 0 0 3px var(--teal-light);
        }

        .readonly-field {
            background-color: var(--gray-bg);
            color: var(--gray-text);
            cursor: not-allowed;
            border-color: var(--border-color);
        }

        .btn-submit {
            background-color: var(--teal);
            color: var(--white);
            border: none;
            padding: 14px;
            width: 100%;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover { background-color: #14a089; transform: translateY(-1px); }

        .error-box {
            color: var(--red);
            background-color: rgba(226, 75, 74, 0.1);
            border: 1px solid rgba(226, 75, 74, 0.2);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Faculty of Technology</h1>
</header>

<div class="form-container">
    <h2>Event Registration</h2>
    <p class="event-sub">Sign up to participate in the upcoming event.</p>

    <form th:action="@{/event/register/save}" th:object="${EventRegForm}" method="post">
        <input type="hidden" name="source" th:value="${source}" />
        <div th:if="${error != null}" class="error-box">
            <strong>Validation Error:</strong> <span th:text="${error}">Error Message</span>
        </div>
        
        <input type="hidden" th:field="*{eventId}" />
        <input type="hidden" th:field="*{organizerName}" />
        
        <div class="form-group">
            <label>Event Name</label>
            <input type="text" th:field="*{eventName}" class="readonly-field" readonly />
        </div>

        <div class="form-group">
            <label>Your Full Name</label>
            <input type="text" th:field="*{Pname}" placeholder="Enter your name" required />
        </div>

        <div class="form-group">
            <label>Registration Number</label>
            <input type="text"
                   th:field="*{pRegistrationnnum}"
                   placeholder="e.g. TG/20xx/xxx"
                   th:readonly="${EventRegForm.pRegistrationnnum != null && !EventRegForm.pRegistrationnnum.isEmpty()}"
                   th:classappend="${EventRegForm.pRegistrationnnum != null && !EventRegForm.pRegistrationnnum.isEmpty()} ? 'readonly-field' : ''"
                   required />
        </div>

        <div class="form-group">
            <label>Contact Number</label>
            <input type="text" th:field="*{pnumber}" placeholder="07x xxxxxxx" required />
        </div>

        <div class="form-group">
            <label>Requested Slots/Tickets</label>
            <input type="number" th:field="*{pslots}" min="1" value="1" required />
        </div>

        <button type="submit" class="btn-submit">Confirm Registration</button>
    </form>
</div>

</body>
</html>
