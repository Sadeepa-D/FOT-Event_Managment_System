<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Join Event - FOT Management</title>
    <style>
        /* General Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Arial, sans-serif; }

        /* Header Styling */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1.2rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .form-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border-top: 5px solid #27ae60; /* Theme Green */
        }

        h2 { color: #2c3e50; margin-bottom: 10px; text-align: center; }
        .event-sub { color: #7f8c8d; text-align: center; margin-bottom: 25px; font-size: 0.9rem; }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #34495e;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #27ae60;
            outline: none;
            box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.1);
        }

        /* Read-only fields styling */
        .readonly-field {
            background-color: #f9f9f9;
            color: #7f8c8d;
            cursor: not-allowed;
        }

        .btn-submit {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover { background-color: #219150; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #3498db;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Faculty of Technology</h1>
</header>

<div class="form-container">
    <h2>Event Registration</h2>
    <p class="event-sub">Sign up to participate in the upcoming event.</p>

    <form th:action="@{/event/register/save}" th:object="${EventRegForm}" method="post">
        <div th:if="${error != null}"
             style="color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; padding: 15px; margin-bottom: 20px; border-radius: 6px; text-align: center; font-size: 0.9rem;">
            <strong>Validation Error:</strong> <span th:text="${error}">Error Message</span>
        </div>
        <input type="hidden" th:field="*{eventId}" />
        <input type="hidden" th:field="*{organizerName}" />
        <div class="form-group">
            <label>Event Name</label>
            <input type="text" th:field="*{eventName}" class="readonly-field" readonly />
        </div>

        <div class="form-group">
            <label>Your Full Name</label>
            <input type="text" th:field="*{Pname}" placeholder="Enter your name" required />
        </div>

        <div class="form-group">
            <label>Registration Number</label>
            <input type="text"
                   th:field="*{pRegistrationnnum}"
                   placeholder="e.g. TG/20xx/xxx"
                   th:readonly="${EventRegForm.pRegistrationnnum != null && !EventRegForm.pRegistrationnnum.isEmpty()}"
                   th:classappend="${EventRegForm.pRegistrationnnum != null && !EventRegForm.pRegistrationnnum.isEmpty()} ? 'readonly-field' : ''"
                   required />
        </div>

        <div class="form-group">
            <label>Contact Number</label>
            <input type="text" th:field="*{pnumber}" placeholder="07x xxxxxxx" required />
        </div>

        <div class="form-group">
            <label>Requested Slots/Tickets</label>
            <input type="number" th:field="*{pslots}" min="1" value="1" required />
        </div>

        <button type="submit" class="btn-submit">Confirm Registration</button>

<!--        <a th:href="@{/paticipanthome}" class="back-link">← Cancel and Go Back</a>-->
    </form>
</div>

</body>
</html>
